<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDb2ZsqINOu_LjUlXdXBYQVImTZ9Ib2iVk",
  authDomain: "vitmarket-kz.firebaseapp.com",
  projectId: "vitmarket-kz",
  storageBucket: "vitmarket-kz.firebasestorage.app",
  messagingSenderId: "690359698157",
  appId: "1:690359698157:web:3c8c89253faaefed9f42e4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const CLOUD_NAME = "dijdrdudb";
const UPLOAD_PRESET = "VITMARKET";

window.publishAd = async () => {

  try {

    const title = document.getElementById("title").value.trim();
    const price = document.getElementById("price").value.trim();
    const city = document.getElementById("city").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const description = document.getElementById("description").value.trim();
    const files = document.getElementById("images").files;

    if (!title || !price || !city || !phone || !description) {
      alert("Заполните все поля");
      return;
    }

    let imageUrls = [];

    for (let file of files) {

      const formData = new FormData();
      formData.append("file", file);
      formData.append("upload_preset", UPLOAD_PRESET);

      const response = await fetch(
        `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,
        {
          method: "POST",
          body: formData
        }
      );

      if (!response.ok) {
        throw new Error("Ошибка загрузки фотографии");
      }

      const data = await response.json();

      if (data.secure_url) {
        imageUrls.push(data.secure_url);
      }

    }

    const user = auth.currentUser;

    await addDoc(collection(db, "ads"), {
      title,
      price,
      city,
      phone,
      description,
      images: imageUrls,
      uid: user?.uid || "",
      userName: user?.displayName || "",
      userPhoto: user?.photoURL || "",
      createdAt: Date.now()
    });

    alert("Объявление опубликовано");
    location.href = "index.html";

  } catch (error) {

    alert(error.message);

  }

};

</script>
