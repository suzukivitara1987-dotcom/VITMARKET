<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "ТВОЙ_API_KEY",
  authDomain: "vitmarket-kz.firebaseapp.com",
  projectId: "vitmarket-kz",
  storageBucket: "vitmarket-kz.firebasestorage.app",
  messagingSenderId: "690359698157",
  appId: "1:690359698157:web:3c8c89253faaefed9f42e4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const CLOUD_NAME = "dijdrdudb";
const UPLOAD_PRESET = "VITMARKET";

window.publishAd = async () => {

  const title = document.getElementById("title").value;
  const price = document.getElementById("price").value;
  const city = document.getElementById("city").value;
  const phone = document.getElementById("phone").value;
  const description = document.getElementById("description").value;
  const files = document.getElementById("images").files;

  if (!title) {
    alert("Введите название");
    return;
  }

  try {

    let imageUrls = [];

    for (let file of files) {

      const formData = new FormData();
      formData.append("file", file);
      formData.append("upload_preset", UPLOAD_PRESET);

      const response = await fetch(
        `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,
        {
          method: "POST",
          body: formData
        }
      );

      const data = await response.json();
      imageUrls.push(data.secure_url);
    }

    const user = auth.currentUser;

    await addDoc(collection(db, "ads"), {
      title,
      price,
      city,
      phone,
      description,
      images: imageUrls,
      uid: user?.uid || "",
      userName: user?.displayName || "",
      userPhoto: user?.photoURL || "",
      createdAt: Date.now()
    });

    alert("Объявление опубликовано!");
    location.href = "index.html";

  } catch (error) {
    alert(error.message);
  }

};

</script>
