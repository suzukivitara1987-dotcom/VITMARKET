<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Подать объявление - VITMARKET.KZ</title>

<link rel="stylesheet" href="style_new.css">

</head>

<body>

<div class="header">

<div class="logo">
<span class="vit">VIT</span>
<span class="market">MARKET</span>
<span class="kz">.KZ</span>
</div>

</div>


<h2 style="padding-left:15px;">
📢 Подать объявление
</h2>


<div class="card">

<h3>📷 Фотографии</h3>

<input type="file" multiple>

<p>Можно добавить до 10 фотографий</p>

</div>


<div class="card">

<h3>📝 Название объявления</h3>

<input
type="text"
placeholder="Например: Samsung S25 Ultra">

</div>


<div class="card">

<h3>📄 Описание</h3>

<textarea
rows="6"
placeholder="Подробно опишите товар...">
</textarea>

</div>


<div class="card">

<h3>💰 Цена</h3>

<input
type="number"
placeholder="Цена в тенге">

</div>


<div class="card">

<h3>📂 Категория</h3>

<select>

<option>Авто</option>

<option>Недвижимость</option>

<option>Работа</option>

<option>Услуги</option>

<option>Электроника</option>

<option>Животные</option>

<option>Строительство</option>

<option>Хобби и отдых</option>

<option>Отдам даром</option>

</select>

</div>


<div class="card">

<h3>📍 Город</h3>

<input
type="text"
placeholder="Например: Уральск">

</div>


<div class="card">

<h3>🤖 AI помощник</h3>
<div class="card">

<h3>⭐ VIP объявление</h3>

<select>

<option>Не использовать</option>

<option>7 дней - 2490 ₸</option>

<option>30 дней - 6990 ₸</option>

</select>

</div>


<div class="card">

<h3>🔥 Горячее объявление</h3>

<select>

<option>Не использовать</option>

<option>7 дней - 1990 ₸</option>

<option>30 дней - 4990 ₸</option>

</select>

</div>


<div class="card">

<h3>🚀 Поднять объявление</h3>

<select>

<option>Не использовать</option>

<option>1 раз - 490 ₸</option>

<option>Неделя - 1490 ₸</option>

<option>Месяц - 3990 ₸</option>

</select>

</div>


<div class="card">

<h3>📌 ТОП объявление</h3>

<select>

<option>Не использовать</option>

<option>7 дней - 3990 ₸</option>

<option>30 дней - 9990 ₸</option>

</select>

</div>


<div class="card">

<h3>📱 Контактный телефон</h3>

<input
type="tel"
placeholder="+7 777 123 45 67">

</div>


<div class="card">

<h3>💬 WhatsApp</h3>

<input
type="tel"
placeholder="+7 777 123 45 67">

</div>


<div class="card">

<button style="
width:100%;
padding:18px;
font-size:18px;
border-radius:20px;
">

📢 Опубликовать объявление
<div class="card">

<h3>🗺 Местоположение</h3>

<select>

<option>Западно-Казахстанская область</option>
<option>Атырауская область</option>
<option>Актюбинская область</option>
<option>Мангистауская область</option>
<option>Костанайская область</option>
<option>Акмолинская область</option>
<option>Павлодарская область</option>
<option>Карагандинская область</option>
<option>Восточно-Казахстанская область</option>
<option>Абайская область</option>
<option>Жетысуская область</option>
<option>Алматинская область</option>
<option>Жамбылская область</option>
<option>Туркестанская область</option>
<option>Кызылординская область</option>

</select>

</div>


<div class="card">

<h3>📍 Город / поселок / село</h3>

<input
type="text"
placeholder="Например: Аксай, Уральск, Дарьинское">

</div>


<div class="card">

<h3>📷 Предпросмотр фотографий</h3>

<img
src="images/no-image.jpg"
style="
width:100%;
border-radius:20px;
">

<p>Можно загрузить до 10 фотографий</p>

</div>


<div class="card">

<h3>🔊 Звуки</h3>

<p>✔ click.mp3</p>

<p>✔ success.mp3</p>

<p>✔ favorite.mp3</p>

<p>✔ welcome.mp3</p>

</div>


<div class="card">

<h3>💳 Оплата дополнительных услуг</h3>
<div class="card">
</div>
<h3>⭐ VIP</h3>
<p>7 дней — 2490 ₸</p>
<p>30 дней — 6990 ₸</p>

</div>

<div class="card">

<h3>🔥 HOT</h3>
<p>7 дней — 1990 ₸</p>
<p>30 дней — 4990 ₸</p>

</div>

<div class="card">

<h3>🚀 Поднять объявление</h3>
<p>1 раз — 490 ₸</p>
<p>Неделя — 1490 ₸</p>

</div>

<div class="card">

<h3>💳 Способы оплаты</h3>
<p>Kaspi Pay</p>
<p>ForteBank</p>
<p>Visa / Mastercard</p>
<p>Google Pay</p>
<p>Apple Pay</p>

</div>
<div class="card">

<h3>❤️ Избранное</h3>

<p>Пользователи смогут сохранять объявления в избранное.</p>

</div>


<div class="card">

<h3>💬 Чат VITMARKET</h3>

<p>Общение между продавцом и покупателем.</p>

</div>


<div class="card">

<h3>🤖 AI помощник</h3>

<p>Автоматическое описание товара.</p>

<p>Подсказка цены.</p>

<p>Подбор категории.</p>

</div>


<div class="card">

<h3>📱 Приложения</h3>

<p>🤖 Android (Google Play)</p>

<p>🍎 iPhone (App Store)</p>

<p>🌐 PWA-версия</p>

</div>


<div class="card">

<h3>🔔 Уведомления</h3>

<p>Новые сообщения</p>

<p>Избранное</p>

<p>VIP и HOT услуги</p>

</div>


<script src="script_new.js"></script>

</html>
