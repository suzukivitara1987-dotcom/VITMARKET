<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Подать объявление - VITMARKET.KZ</title>

<link rel="stylesheet" href="style_new.css">

</head>

<body>

<div class="header">

<div class="logo">
<span class="vit">VIT</span>
<span class="market">MARKET</span>
<span class="kz">.KZ</span>
</div>

</div>


<h2 style="padding-left:15px;">
📢 Подать объявление
</h2>


<div class="card">

<h3>📷 Фотографии</h3>

<input type="file" multiple>

<p>Можно добавить до 10 фотографий</p>

</div>


<div class="card">

<h3>📝 Название объявления</h3>

<input
type="text"
placeholder="Например: Samsung S25 Ultra">

</div>


<div class="card">

<h3>📄 Описание</h3>

<textarea
rows="6"
placeholder="Подробно опишите товар...">
</textarea>

</div>


<div class="card">

<h3>💰 Цена</h3>

<input
type="number"
placeholder="Цена в тенге">

</div>


<div class="card">

<h3>📂 Категория</h3>

<select>

<option>Авто</option>

<option>Недвижимость</option>

<option>Работа</option>

<option>Услуги</option>

<option>Электроника</option>

<option>Животные</option>

<option>Строительство</option>

<option>Хобби и отдых</option>

<option>Отдам даром</option>

</select>

</div>


<div class="card">

<h3>📍 Город</h3>

<input
type="text"
placeholder="Например: Уральск">

</div>


<div class="card">

<h3>🤖 AI помощник</h3>
<div class="card">

<h3>⭐ VIP объявление</h3>

<select>

<option>Не использовать</option>

<option>7 дней - 2490 ₸</option>

<option>30 дней - 6990 ₸</option>

</select>

</div>


<div class="card">

<h3>🔥 Горячее объявление</h3>

<select>

<option>Не использовать</option>

<option>7 дней - 1990 ₸</option>

<option>30 дней - 4990 ₸</option>

</select>

</div>


<div class="card">

<h3>🚀 Поднять объявление</h3>

<select>

<option>Не использовать</option>

<option>1 раз - 490 ₸</option>

<option>Неделя - 1490 ₸</option>

<option>Месяц - 3990 ₸</option>

</select>

</div>


<div class="card">

<h3>📌 ТОП объявление</h3>

<select>

<option>Не использовать</option>

<option>7 дней - 3990 ₸</option>

<option>30 дней - 9990 ₸</option>

</select>

</div>


<div class="card">

<h3>📱 Контактный телефон</h3>

<input
type="tel"
placeholder="+7 777 123 45 67">

</div>


<div class="card">

<h3>💬 WhatsApp</h3>

<input
type="tel"
placeholder="+7 777 123 45 67">

</div>


<div class="card">

<button style="
width:100%;
padding:18px;
font-size:18px;
border-radius:20px;
">

📢 Опубликовать объявление

</button>

</div>
<button>

Подобрать категорию и цену

</button>

</div>
