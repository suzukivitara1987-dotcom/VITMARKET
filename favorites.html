<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Избранное - VITMARKET.KZ</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
padding-bottom:90px;
}

.header{
background:#00a651;
color:white;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.title{
padding:15px;
font-size:24px;
font-weight:bold;
}

#favorites{
padding:15px;
display:grid;
gap:20px;
}

.card{
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 2px 10px rgba(0,0,0,.15);
cursor:pointer;
}

.card img{
width:100%;
height:240px;
object-fit:cover;
}

.info{
padding:15px;
}

.name{
font-size:22px;
font-weight:bold;
}

.price{
font-size:28px;
font-weight:bold;
color:#00a651;
margin-top:10px;
}

.city{
margin-top:10px;
color:gray;
}

.empty{
text-align:center;
font-size:22px;
margin-top:100px;
color:gray;
}

.bottomMenu{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
display:flex;
justify-content:space-around;
padding:15px 0;
box-shadow:0 -2px 10px rgba(0,0,0,.1);
}

.menuItem{
text-align:center;
font-size:24px;
color:#555;
text-decoration:none;
}

.menuItem i{
display:block;
margin-bottom:5px;
}
</style>
</head>

<body>

<div class="header">
VITMARKET.KZ
</div>

<div class="title">
❤️ Избранное
</div>

<div id="favorites"></div>

<div class="bottomMenu">

<a href="index.html" class="menuItem">
<i class="fa-solid fa-house"></i>
Главная
</a>

<a href="favorites.html" class="menuItem">
<i class="fa-solid fa-heart"></i>
Избранное
</a>

<a href="myads.html" class="menuItem">
<i class="fa-solid fa-box"></i>
Мои объявления
</a>

</div>

<script>

const container=document.getElementById("favorites");

let favorites=JSON.parse(localStorage.getItem("favorites")) || [];

if(favorites.length===0){

container.innerHTML=`
<div class="empty">
У вас пока нет избранных объявлений ❤️
</div>`;

}else{

favorites.forEach(ad=>{

container.innerHTML+=`

<div class="card">

<img src="${ad.image}">

<div class="info">

<div class="name">
${ad.title}
</div>

<div class="price">
${ad.price} ₸
</div>

<div class="city">
${ad.city}
</div>

</div>

</div>

`;

});

}

</script>

</body>
</html>
