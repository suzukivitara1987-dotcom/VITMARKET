<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Избранное | VITMARKET.KZ</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
}

.header{
background:#006a51;
color:white;
padding:20px;
font-size:24px;
font-weight:bold;
text-align:center;
}

.ads{
padding:15px;
display:grid;
gap:20px;
}

.card{
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 2px 10px rgba(0,0,0,.15);
position:relative;
}

.card img{
width:100%;
height:230px;
object-fit:cover;
}

.info{
padding:15px;
}

.title{
font-size:22px;
font-weight:bold;
}

.price{
font-size:26px;
font-weight:bold;
color:#006a51;
margin-top:10px;
}

.city{
margin-top:10px;
color:gray;
}

.remove{
position:absolute;
right:15px;
top:15px;
font-size:32px;
cursor:pointer;
}
</style>

</head>
<body>

<div class="header">
❤️ Избранное
</div>

<div class="ads" id="ads"></div>

<script>

const ads=document.getElementById("ads");

function loadFavorites(){

let favorites=JSON.parse(localStorage.getItem("favorites")) || [];

ads.innerHTML="";

if(favorites.length===0){
ads.innerHTML="<h2 style='text-align:center'>Избранное пусто</h2>";
return;
}

favorites.forEach(ad=>{

ads.innerHTML+=`
<div class="card">

<div class="remove"
onclick="removeFavorite('${ad.id}')">
❌
</div>

<img src="${ad.image}">

<div class="info">

<div class="title">
${ad.title}
</div>

<div class="price">
${ad.price} ₸
</div>

<div class="city">
${ad.city}
</div>

</div>

</div>
`;

});

}

function removeFavorite(id){

let favorites=JSON.parse(localStorage.getItem("favorites")) || [];

favorites=favorites.filter(item=>item.id!==id);

localStorage.setItem(
"favorites",
JSON.stringify(favorites)
);

loadFavorites();

}

loadFavorites();

</script>

</body>
</html>
