<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VITMARKET.KZ</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
padding-bottom:100px;
}

.header{
background:#00a651;
padding:20px;
color:white;
text-align:center;
font-size:28px;
font-weight:bold;
}

.top{
padding:15px;
}

.search{

width:100%;
padding:15px;
border:none;
border-radius:15px;
font-size:16px;
box-sizing:border-box;

}

.addButton{

display:block;
margin-top:15px;
background:#00a651;
color:white;
text-decoration:none;
text-align:center;
padding:18px;
border-radius:15px;
font-size:20px;
font-weight:bold;

}

.ads{

padding:15px;
display:grid;
gap:20px;

}

.card{

background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 2px 10px rgba(0,0,0,.15);
cursor:pointer;

}

.card img{

width:100%;
height:240px;
object-fit:cover;

}

.info{

padding:15px;

}

.title{

font-size:22px;
font-weight:bold;

}

.price{

font-size:28px;
font-weight:bold;
color:#00a651;
margin-top:10px;

}

.city{

margin-top:10px;
color:gray;

}

.bottomMenu{

position:fixed;
bottom:0;
left:0;
right:0;
background:white;
display:flex;
justify-content:space-around;
padding:15px 0;
box-shadow:0 -2px 10px rgba(0,0,0,.1);

}

.menuItem{

text-align:center;
font-size:14px;
color:#555;
text-decoration:none;

}

.menuItem i{

display:block;
font-size:24px;
margin-bottom:5px;

}

</style>

</head>

<body>

<div class="header">

VITMARKET.KZ

</div>

<div class="top">

<input
id="search"
class="search"
placeholder="Поиск объявлений">

<a
class="addButton"
href="add.html">

➕ Подать объявление

</a>

</div>

<div
class="ads"
id="ads">

</div>

<div class="bottomMenu">

<a href="index.html" class="menuItem">

<i class="fa-solid fa-house"></i>

Главная

</a>

<a href="favorites.html" class="menuItem">

<i class="fa-solid fa-heart"></i>

Избранное

</a>

<a href="sales.html" class="menuItem">

<i class="fa-solid fa-box"></i>

Продажи

</a>

<a href="messages.html" class="menuItem">

<i class="fa-solid fa-comment"></i>

Сообщения

</a>

<a href="profile.html" class="menuItem">

<i class="fa-solid fa-user"></i>

Профиль

</a>

</div><script type="module">

import { db } from "./firebase-config.js";

import {
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";

const adsContainer = document.getElementById("ads");

let allAds = [];

window.openAd = (id)=>{

location.href=`ad.html?id=${id}`;

};

async function loadAds(){

adsContainer.innerHTML="";

const snapshot = await getDocs(collection(db,"ads"));

allAds=[];

snapshot.forEach((item)=>{

const ad=item.data();

allAds.push({

id:item.id,
...ad

});

});

showAds(allAds);

}

function showAds(list){

adsContainer.innerHTML="";

list.forEach((ad)=>{

let badge="";

if(ad.vip){

badge=`<div style="
background:gold;
color:black;
padding:8px;
font-weight:bold;
text-align:center;
">
⭐ VIP
</div>`;

}

if(ad.hot){

badge=`<div style="
background:red;
color:white;
padding:8px;
font-weight:bold;
text-align:center;
">
🔥 ЖАРКОЕ
</div>`;

}

if(ad.premium){

badge=`<div style="
background:#00bfff;
color:white;
padding:8px;
font-weight:bold;
text-align:center;
">
💎 PREMIUM
</div>`;

}

if(ad.turbo){

badge=`<div style="
background:purple;
color:white;
padding:8px;
font-weight:bold;
text-align:center;
">
🚀 TURBO
</div>`;

}

adsContainer.innerHTML+=`

<div
class="card"
onclick="openAd('${ad.id}')">
<div
onclick="event.stopPropagation();addFavorite(
'${ad.id}',
'${ad.title}',
'${ad.price}',
'${ad.city}',
'${ad.images?.[0] || ""}'
)"
style="
position:absolute;
right:15px;
top:15px;
font-size:30px;
color:red;
z-index:10;
">

❤️

</div>
${badge}

<img src="${ad.images?.[0] || ''}">

<div class="info">

<div class="title">

${ad.title}

</div>

<div class="price">

${ad.price} ₸

</div>

<div class="city">

${ad.city}

</div>

</div>

</div>

`;

});

}

document
.getElementById("search")
.addEventListener("input",(e)=>{

const text=e.target.value.toLowerCase();

const filtered=allAds.filter(ad=>

(ad.title || "")
.toLowerCase()
.includes(text)

);

showAds(filtered);

});

loadAds();

</script><script>

// Подготовка голосового помощника VITMARKET

const voiceEnabled = localStorage.getItem("voiceEnabled");

if (voiceEnabled === "true") {

setTimeout(() => {

const speech = new SpeechSynthesisUtterance(
"Здравствуйте! Вас приветствует VITMARKET. Желаем приятных покупок и успешных продаж."
);

speech.lang = "ru-RU";

window.speechSynthesis.speak(speech);

},1000);

}

</script>
<script>

function addFavorite(
id,
title,
price,
city,
image
){

let favorites=
JSON.parse(
localStorage.getItem("favorites")
) || [];

if(
favorites.find(item=>item.id===id)
){

alert("❤️ Уже в избранном");

return;

}

favorites.push({

id,
title,
price,
city,
image

});

localStorage.setItem(
"favorites",
JSON.stringify(favorites)
);

alert("❤️ Добавлено в избранное");

}

</script>

</script>
</body>

</html>
