<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VITMARKET.KZ</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
}

.header{
background:#00a651;
color:white;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.top{
padding:15px;
}

.search{
width:100%;
padding:15px;
border:none;
border-radius:12px;
font-size:16px;
box-sizing:border-box;
}

.addButton{
display:block;
margin-top:15px;
background:#00a651;
color:white;
text-align:center;
text-decoration:none;
padding:18px;
font-size:20px;
font-weight:bold;
border-radius:15px;
}

.ads{
padding:15px;
display:grid;
gap:20px;
}

.card{
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 2px 10px rgba(0,0,0,.15);
cursor:pointer;
}

.card img{
width:100%;
height:240px;
object-fit:cover;
}

.info{
padding:15px;
}

.title{
font-size:22px;
font-weight:bold;
}

.price{
font-size:28px;
font-weight:bold;
color:#00a651;
margin-top:10px;
}

.city{
color:gray;
margin-top:10px;
}

</style>

</head>

<body>

<div class="header">
VITMARKET.KZ
</div>

<div class="top">

<input
class="search"
id="search"
placeholder="Поиск объявлений">

<a
class="addButton"
href="add.html">

➕ Подать объявление

</a>

</div>

<div
class="ads"
id="ads">

</div><script type="module">

import { db } from "./firebase-config.js";

import {
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";

const adsContainer = document.getElementById("ads");

let allAds = [];

window.openAd = (id) => {

location.href = `ad.html?id=${id}`;

};

async function loadAds(){

adsContainer.innerHTML = "";

const snapshot = await getDocs(collection(db,"ads"));

allAds = [];

snapshot.forEach((item)=>{

const ad = item.data();

allAds.push({
id:item.id,
...ad
});

});

showAds(allAds);

}

function showAds(list){

adsContainer.innerHTML = "";

list.forEach((ad)=>{

adsContainer.innerHTML += `

<div class="card"
onclick="openAd('${ad.id}')">

<img src="${ad.images?.[0] || ''}">

<div class="info">

<div class="title">

${ad.title}

</div>

<div class="price">

${ad.price} ₸

</div>

<div class="city">

${ad.city}

</div>

</div>

</div>

`;

});

}

document.getElementById("search")
.addEventListener("input",(e)=>{

const text = e.target.value.toLowerCase();

const filtered = allAds.filter(ad=>

(ad.title || "")
.toLowerCase()
.includes(text)

);

showAds(filtered);

});

loadAds();

</script>

</body>
</html>
