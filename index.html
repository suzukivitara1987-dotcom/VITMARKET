<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VITMARKET.KZ</title>

<style>

body{
margin:0;
background:#f5f5f5;
font-family:Arial,sans-serif;
}

.header{
background:#00a651;
color:white;
text-align:center;
padding:20px;
font-size:28px;
font-weight:bold;
}

.top{
padding:15px;
}

.search{
width:100%;
padding:15px;
border:none;
border-radius:10px;
font-size:16px;
box-sizing:border-box;
}

.addButton{
display:block;
margin-top:15px;
background:#00a651;
color:white;
text-decoration:none;
text-align:center;
padding:18px;
font-size:22px;
font-weight:bold;
border-radius:15px;
}

.ads{
padding:15px;
display:grid;
gap:20px;
}

.card{
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 2px 10px rgba(0,0,0,.15);
}

.card img{
width:100%;
height:250px;
object-fit:cover;
}

.info{
padding:15px;
}

.title{
font-size:24px;
font-weight:bold;
}

.price{
color:#00a651;
font-size:30px;
font-weight:bold;
margin-top:10px;
}

.city{
margin-top:10px;
color:gray;
font-size:20px;
}

</style>
</head>

<body>

<div class="header">
VITMARKET.KZ
</div>

<div class="top">

<input class="search" placeholder="Поиск">

<a class="addButton" href="add.html">
➕ Подать объявление
</a>

</div>

<div class="ads" id="ads"></div>

<script type="module">

import { db } from "./firebase-config.js";

import {
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";

const ads = document.getElementById("ads");

async function loadAds(){

ads.innerHTML="";

const snapshot = await getDocs(collection(db,"ads"));

snapshot.forEach(doc=>{

const ad = doc.data();

ads.innerHTML += `

<div class="card">

<img src="${ad.images?.[0] || ''}">

<div class="info">

<div class="title">
${ad.title}
</div>

<div class="price">
${ad.price} ₸
</div>

<div class="city">
${ad.city}
</div>

</div>

</div>

`;

});

}

loadAds();

</script>

</body>
</html>
