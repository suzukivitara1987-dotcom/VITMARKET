<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мои объявления</title>

<style>

body{
margin:0;
background:#f5f5f5;
font-family:Arial,sans-serif;
}

.header{
background:#00a651;
color:white;
text-align:center;
padding:20px;
font-size:30px;
font-weight:bold;
}

.ads{
padding:15px;
display:grid;
gap:20px;
}

.card{
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 2px 10px rgba(0,0,0,.15);
}

.card img{
width:100%;
height:250px;
object-fit:cover;
}

.info{
padding:15px;
}

.title{
font-size:24px;
font-weight:bold;
}

.price{
font-size:28px;
font-weight:bold;
color:#00a651;
margin-top:10px;
}

.city{
color:gray;
margin-top:10px;
}

.deleteButton{
width:100%;
padding:15px;
margin-top:15px;
border:none;
background:red;
color:white;
font-size:18px;
border-radius:10px;
}

</style>
</head>
<body>

<div class="header">
Мои объявления
</div>

<div class="ads" id="ads"></div>

<script type="module">

import {
db
}
from "./firebase-config.js";

import {
collection,
getDocs,
deleteDoc,
doc
}
from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";

const adsContainer=document.getElementById("ads");

async function loadAds(){

adsContainer.innerHTML="";

const snapshot=await getDocs(collection(db,"ads"));

snapshot.forEach((item)=>{

const ad=item.data();

adsContainer.innerHTML+=`

<div class="card">

<img src="${ad.images?.[0] || ''}">

<div class="info">

<div class="title">
${ad.title}
</div>

<div class="price">
${ad.price} ₸
</div>

<div class="city">
${ad.city}
</div>

<button class="deleteButton"
onclick="deleteAd('${item.id}')">
Удалить
</button>

</div>
</div>

`;

});

}

window.deleteAd=async(id)=>{

if(confirm("Удалить объявление?")){

await deleteDoc(doc(db,"ads",id));

loadAds();

}

}

loadAds();

</script>

</body>
</html>
