<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VITMARKET.KZ</title>

<style>
body{
margin:0;
background:#00a651;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
font-family:Arial;
overflow:hidden;
}

.logo{
text-align:center;
animation:zoom 2s infinite alternate;
}

h1{
font-size:50px;
margin:0;
}

p{
font-size:20px;
}

@keyframes zoom{
from{transform:scale(1);}
to{transform:scale(1.1);}
}
</style>
</head>

<body>

<div class="logo">
<h1>❤️ VITMARKET.KZ</h1>
<p>Покупай и продавай по всему Казахстану</p>
</div>

<script>

let speech = new SpeechSynthesisUtterance(
"Добро пожаловать в Витмаркет Кей Зет. Здесь вы можете покупать и продавать товары по всему Казахстану."
);

speech.lang="ru-RU";

window.onload=()=>{
speechSynthesis.speak(speech);

setTimeout(()=>{
window.location.href="index.html";
},7000);

}

</script>

</body>
</html>
